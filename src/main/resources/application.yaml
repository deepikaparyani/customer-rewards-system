spring:
  application:
    name: Customer-Rewards

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        default_schema: customer_rewards

server:
  port: 8080

logging:
  level:
    org.springframework: INFO
    com.infosys.rewards: DEBUG

springdoc:
  swagger-ui:
    path: /swagger-ui.html
